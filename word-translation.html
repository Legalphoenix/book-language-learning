<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word-by-word translation</title>
  <style>
    :root {
      --bg: linear-gradient(135deg, #f2e7d7 0%, #fefcf8 45%, #e6f2ff 100%);
      --card: #ffffffcc;
      --text: #1e1a16;
      --muted: #5a5360;
      --accent: #1f4e79;
      --line: #e6dccc;
      --word-bg: #f9f3e7;
      --word-hover: #fff2b3;
      --word-active: #ffe28f;
      --shadow: 0 14px 40px rgba(28, 30, 37, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Merriweather", "Georgia", "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: start;
      padding: 22px;
    }

    main {
      width: min(960px, 100%);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.65);
      box-shadow: var(--shadow);
      border-radius: 18px;
      padding: 22px;
      backdrop-filter: blur(4px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.2rem, 2vw, 1.7rem);
      color: #12314f;
      letter-spacing: 0.01em;
    }

    .hint {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.35;
    }

    .pair {
      display: grid;
      gap: 8px;
      padding: 14px 0 12px;
      border-bottom: 1px solid var(--line);
    }

    .pair-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      width: 100%;
    }

    .row-controls {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
      margin: 4px 0 0;
    }

    .translation-toggle {
      width: 20px;
      height: 20px;
      padding: 0;
      border: 1px solid #c8d9ea;
      background: rgba(255, 255, 255, 0.72);
      color: transparent;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0;
      line-height: 0;
      cursor: pointer;
      transition:
        border-color 120ms ease,
        background-color 120ms ease,
        transform 80ms ease,
        opacity 120ms ease;
      opacity: 0.55;
      flex: 0 0 auto;
      margin: 4px 0 0;
    }

    .translation-toggle::before {
      content: '▾';
      font-size: 13px;
      line-height: 1;
      color: #5e7f9f;
      transform: translateY(-1px) rotate(0deg);
      transition: transform 140ms ease, color 120ms ease;
    }

    .translation-toggle:hover,
    .translation-toggle:focus-visible {
      opacity: 0.95;
      border-color: #9ab9d6;
      background: #f2f7ff;
      transform: translateY(-1px);
      outline: none;
    }

    .translation-toggle[aria-expanded="true"]::before {
      transform: translateY(-1px) rotate(180deg);
      color: #2f577f;
    }

    .translation-toggle:focus-visible {
      box-shadow: 0 0 0 2px #bfdbfe66;
    }

    .translation-toggle:focus-visible::before {
      color: #2f577f;
    }

    .translation-toggle[aria-expanded="true"] {
      opacity: 0.75;
    }

    .sentence-play {
      width: 20px;
      height: 20px;
      padding: 0;
      border: 1px solid #c8d9ea;
      background: rgba(255, 255, 255, 0.72);
      color: transparent;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0;
      line-height: 0;
      cursor: pointer;
      transition:
        border-color 120ms ease,
        background-color 120ms ease,
        transform 80ms ease,
        opacity 120ms ease,
        color 120ms ease;
      opacity: 0.55;
      flex: 0 0 auto;
    }

    .sentence-play::before {
      content: '▶';
      font-size: 10px;
      line-height: 1;
      color: #5e7f9f;
      display: inline-block;
      transform: translateX(1px);
    }

    .sentence-play:hover,
    .sentence-play:focus-visible {
      opacity: 0.95;
      border-color: #9ab9d6;
      background: #f2f7ff;
      transform: translateY(-1px);
      outline: none;
    }

    .sentence-play:focus-visible {
      box-shadow: 0 0 0 2px #bfdbfe66;
    }

    .sentence-play:disabled {
      opacity: 0.26;
      cursor: not-allowed;
    }

    .sentence-play.loading {
      opacity: 0.72;
    }

    .sentence-play.loading::before {
      content: '◌';
      transform: rotate(0deg);
      animation: spin 700ms linear infinite;
    }

    .sentence-play.is-playing::before {
      content: '⏸';
      transform: none;
      font-size: 9px;
    }

    @keyframes spin {
      from { transform: translateX(1px) rotate(0deg); }
      to { transform: translateX(1px) rotate(360deg); }
    }

    .pair:last-child { border-bottom: none; }

    .sentence {
      margin: 0;
      font-size: 1.08rem;
      line-height: 1.72;
      font-family: inherit;
      letter-spacing: 0.01em;
      text-wrap: pretty;
      word-wrap: break-word;
    }

    .pair-header .sentence {
      min-width: 0;
      flex: 1;
      margin: 0;
    }

    .sentence.en {
      color: #2a445d;
      font-size: 1.01rem;
    }

    .details-panel {
      display: grid;
      gap: 12px;
    }

    .details-panel .sentence.en {
      margin: 0;
    }

    .hidden-translation {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transform: translateY(-2px);
      margin-top: 0;
      margin-bottom: 0;
      transition: max-height 180ms ease, opacity 140ms ease, transform 140ms ease;
      pointer-events: none;
      white-space: normal;
    }

    .hidden-translation.open {
      max-height: 760px;
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      margin-top: 2px;
      margin-bottom: 0;
    }

    .scene-card {
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid #d7e3ed;
      background: linear-gradient(180deg, #f7fbff 0%, #edf4fb 100%);
      box-shadow: 0 14px 26px rgba(25, 45, 67, 0.1);
    }

    .scene-card img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }

    .word {
      cursor: pointer;
      border-radius: 7px;
      padding: 1px 3px;
      margin: 0 1px;
      transition: background-color 90ms ease, transform 90ms ease;
      background: transparent;
      display: inline-block;
      position: relative;
    }

    .word:hover {
      background: var(--word-hover);
    }

    .word:focus-visible {
      outline: 2px solid #8eb2d7;
      outline-offset: 2px;
    }

    .word.active {
      background: var(--word-active);
      transform: translateY(-1px);
    }

    #translation-popup {
      --pad: 10px;
      position: fixed;
      z-index: 50;
      max-width: min(86vw, 320px);
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px) scale(0.97);
      transition: opacity 120ms ease, transform 120ms ease;
      background: #0f172a;
      color: #e9edf5;
      border-radius: 12px;
      padding: 10px var(--pad);
      box-shadow: 0 14px 30px rgba(10, 20, 45, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 0.95rem;
      line-height: 1.35;
      white-space: normal;
      visibility: hidden;
    }

    #translation-popup.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      visibility: visible;
    }

    #translation-popup .src {
      font-weight: 700;
      color: #d5b95d;
    }

    #translation-popup .arrow {
      margin: 0 6px;
      color: #f3a8a8;
    }

    #translation-popup .note {
      color: #9fb0c5;
      margin-left: 2px;
      display: block;
      margin-top: 5px;
      font-size: 0.76rem;
      line-height: 1.3;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
  </style>
</head>

        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')

    function tokenize(text) {
      return text.match(/[\p{L}\p{N}]+(?:['’-][\p{L}\p{N}]+)*|[^\s\p{L}\p{N}]+|\s+/gu) || [];
    }

    function isWordToken(token) {
      return /[\p{L}\p{N}]/u.test(token);
    }

    function normalizeWord(token) {
      return token
        .normalize('NFKC')
        .toLowerCase()
        .replace(/[\u2019']/g, '')
        .replace(/^\p{P}+|\p{P}+$|^\p{S}+|\p{S}+$/gu, '')
        .replace(/ё/g, 'е')
        .replace(/…/g, '')
        .trim();
    }

    function getWordTranslation(raw, lang) {
      const norm = normalizeWord(raw);
      if (!norm) return '';
      if (lang === 'ru') {
        return ruToEn[norm] || '';
      }
      return enToRu[norm] || '';
    }

    function makeAudioButtonReady(pairIndex, ready = false) {
      const pair = sentences[pairIndex];
      const button = pair?.playButton;
      if (!button) {
        return;
      }
      button.disabled = !ready;
      button.dataset.ready = ready ? 'true' : 'false';
      button.setAttribute(
        'aria-label',
        ready
          ? `Play sentence ${pairIndex + 1} audio with random voice`
          : 'No sentence audio available'
      );
    }

    function buildLocalAudioFiles(pairIndex, voices) {
      const sentenceId = String(pairIndex + 1).padStart(2, '0');
      return voices.map((voice) => `${localAudioBasePath}/sentence-${sentenceId}-${voice}.mp3`);
    }

    function loadLocalSentenceAudioFiles() {
      localSentenceAudioVoices.forEach((voices, pairIndex) => {
        const files = Array.isArray(voices) ? buildLocalAudioFiles(pairIndex, voices) : [];
        sentences[pairIndex].audioFiles = files;
        makeAudioButtonReady(pairIndex, files.length > 0);
      });
    }

    function stopSentenceAudio() {
      sentenceAudio.pause();
      sentenceAudio.removeAttribute('src');
      if (activeAudioButton) {
        activeAudioButton.classList.remove('is-playing');
        activeAudioButton.classList.remove('loading');
        activeAudioButton.disabled = false;
        activeAudioButton.setAttribute('aria-pressed', 'false');
        activeAudioButton.setAttribute(
          'aria-label',
          `Play sentence ${activeAudioButton.dataset.pair ? Number(activeAudioButton.dataset.pair) + 1 : ''} audio with random voice`
        );
      }
      activeAudioButton = null;
    }

    async function playSentenceAudio(pairIndex, button) {
      const files = sentences[pairIndex]?.audioFiles;
      if (!Array.isArray(files) || !files.length) {
        return;
      }

      if (activeAudioButton === button && !sentenceAudio.paused) {
        stopSentenceAudio();
        return;
      }

      stopSentenceAudio();
      const audioUrl = files[Math.floor(Math.random() * files.length)];

      button.disabled = true;
      button.classList.add('loading');
      button.classList.remove('is-playing');
      button.setAttribute('aria-label', `Loading sentence ${pairIndex + 1} audio`);

      try {
        sentenceAudio.src = encodeURI(audioUrl);
        activeAudioButton = button;

        button.classList.remove('loading');
        button.classList.add('is-playing');
        button.setAttribute('aria-pressed', 'true');
        button.setAttribute('aria-label', `Stop sentence ${pairIndex + 1} audio`);
        await sentenceAudio.play();
        button.disabled = false;

        sentenceAudio.onended = () => {
          if (activeAudioButton === button) {
            stopSentenceAudio();
          }
        };
      } catch {
        button.classList.remove('loading');
        button.disabled = false;
      }
    }

    function makeSentence(text, lang, row) {
      const p = document.createElement('p');
      p.className = `sentence ${lang}`;
      tokenize(text).forEach(token => {
        if (!isWordToken(token)) {
          p.appendChild(document.createTextNode(token));
          return;
        }

        const span = document.createElement('span');
        span.className = 'word';
        span.textContent = token;
        span.tabIndex = 0;
        span.dataset.lang = lang;
        span.dataset.row = row;

        const direct = getWordTranslation(token, lang);
        span.dataset.translation = direct || '';
        p.appendChild(span);
      });
      return p;
    }

    function makeTranslationPanel(pairIndex, translationText) {
      const panel = document.createElement('div');
      panel.className = 'details-panel hidden-translation';
      const translation = makeSentence(translationText, 'en', pairIndex);
      const sceneCard = document.createElement('div');
      const sceneImage = document.createElement('img');
      sceneCard.className = 'scene-card';
      sceneImage.src = sentenceSceneImages[pairIndex];
      sceneImage.alt = sentenceSceneAltText[pairIndex] || `Illustration for sentence ${pairIndex + 1}`;
      sceneImage.loading = 'lazy';
      sceneImage.decoding = 'async';
      sceneCard.appendChild(sceneImage);
      panel.appendChild(translation);
      panel.appendChild(sceneCard);
      panel.classList.add('hidden-translation');
      panel.id = `sentence-translation-${pairIndex}`;
      return panel;
    }

    function makePlayButton(pairIndex) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'sentence-play';
      btn.dataset.pair = String(pairIndex);
      btn.setAttribute('aria-label', 'No sentence audio available');
      btn.dataset.ready = 'false';
      btn.disabled = true;
      return btn;
    }

    function makeRowButton(pairIndex) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'translation-toggle';
      btn.textContent = '';
      btn.setAttribute('aria-label', 'Show sentence translation');
      btn.dataset.translationFor = `sentence-translation-${pairIndex}`;
      btn.setAttribute('aria-expanded', 'false');
      btn.setAttribute('aria-controls', `sentence-translation-${pairIndex}`);
      return btn;
    }

    function render() {
      sentences.forEach((pair, index) => {
        const row = document.createElement('article');
        row.className = 'pair';

        const ru = makeSentence(pair.ru, 'ru', index);
        const en = makeTranslationPanel(index, pair.en);
        const showBtn = makeRowButton(index);
        const playBtn = makePlayButton(index);
        pair.playButton = playBtn;
        const header = document.createElement('div');
        header.className = 'pair-header';
        header.appendChild(ru);
        const controls = document.createElement('div');
        controls.className = 'row-controls';
        controls.appendChild(playBtn);
        controls.appendChild(showBtn);
        header.appendChild(controls);
        row.appendChild(header);
        row.appendChild(en);
        pairsRoot.appendChild(row);
      });
    }

    function toggleSentence(button, panel) {
      if (!panel || !button) {
        return;
      }
      const isOpen = button.getAttribute('aria-expanded') === 'true';
      const next = !isOpen;
      button.setAttribute('aria-expanded', String(next));
      button.setAttribute('aria-label', next ? 'Hide sentence translation' : 'Show sentence translation');
      panel.classList.toggle('open', !isOpen);
      hidePopup();
    }

    function showPopup(wordEl) {
      const text = wordEl.dataset.translation || 'No direct word translation';

      popup.textContent = '';

      const source = document.createElement('span');
      source.className = 'src';
      source.textContent = wordEl.textContent;
      const arrow = document.createElement('span');
      arrow.className = 'arrow';
      arrow.textContent = '→';
      const target = document.createElement('span');
      target.className = 'dst';
      target.textContent = text;

      popup.appendChild(source);
      popup.appendChild(arrow);
      popup.appendChild(target);

      const rect = wordEl.getBoundingClientRect();
      popup.classList.add('show');
      popup.style.left = '-9999px';
      popup.style.top = '-9999px';

      const popupRect = popup.getBoundingClientRect();
      const left = Math.min(
        Math.max(8, rect.left + (rect.width / 2) - (popupRect.width / 2)),
        window.innerWidth - popupRect.width - 8
      );
      let top = rect.top - popupRect.height - 12;
      if (top < 8) {
        top = rect.bottom + 8;
      }

      popup.style.left = `${left}px`;
      popup.style.top = `${top}px`;
      popup.style.visibility = 'visible';
    }

    function hidePopup() {
      popup.classList.remove('show');
      popup.style.visibility = 'hidden';
      popup.style.left = '-9999px';
      popup.style.top = '-9999px';
      if (activeWord) {
        activeWord.classList.remove('active');
        activeWord = null;
      }
    }

    pairsRoot.addEventListener('click', (event) => {
      const playButton = event.target.closest('.sentence-play');
      if (playButton) {
        const pairIndex = Number(playButton.dataset.pair);
        if (!Number.isNaN(pairIndex)) {
          playSentenceAudio(pairIndex, playButton);
        }
        return;
      }

      const toggle = event.target.closest('.translation-toggle');
      if (toggle) {
        const panel = document.getElementById(toggle.dataset.translationFor);
        toggleSentence(toggle, panel);
        return;
      }

      const word = event.target.closest('.word');
      if (!word) {
        hidePopup();
        return;
      }

      if (activeWord === word) {
        hidePopup();
        return;
      }

      if (activeWord) {
        activeWord.classList.remove('active');
      }
      activeWord = word;
      word.classList.add('active');
      showPopup(word);
    });

    pairsRoot.addEventListener('keydown', (event) => {
      if ((event.key === 'Enter' || event.key === ' ') && event.target.classList?.contains('word')) {
        event.preventDefault();
        event.target.click();
      }
    });

    document.addEventListener('click', (event) => {
      if (!event.target.closest('.word') && !popup.contains(event.target)) {
        hidePopup();
      }
    });

    window.addEventListener('scroll', hidePopup, true);
    window.addEventListener('resize', hidePopup, true);

    render();
    loadLocalSentenceAudioFiles();
  </script>
</body>
</html>
